name: Build deploy images

# Builds the production app + nginx images on GitHub runners and pushes them
# to GHCR, so low-RAM servers can pull instead of compiling the frontend.
# Packages created by GITHUB_TOKEN inherit the repo's (public) visibility.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docker/**
      - contentcuration/**
      - package.json
      - pnpm-lock.yaml
      - requirements.txt
      - webpack.config.js
      - .github/workflows/build-deploy-images.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: build-deploy-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/studio-app-prod:latest
            ghcr.io/${{ github.repository_owner }}/studio-app-prod:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.nginx.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/studio-nginx-prod:latest
            ghcr.io/${{ github.repository_owner }}/studio-nginx-prod:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
