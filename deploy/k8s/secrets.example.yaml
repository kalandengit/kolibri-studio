# Copy to secrets.yaml, replace every value, then: kubectl apply -f secrets.yaml
# Never commit secrets.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: studio-secrets
  namespace: kolibri-studio
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "REPLACE-with-long-random-string"
  DATA_DB_PASS: "REPLACE-postgres-password"
  AWS_ACCESS_KEY_ID: "studio"
  AWS_SECRET_ACCESS_KEY: "REPLACE-minio-password"
